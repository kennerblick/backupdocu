version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backupdocu-api
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
    volumes:
      - ./backend:/app
      - ./data:/app/data

  nginx:
    image: nginx:alpine
    container_name: backupdocu-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-9090}:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - /opt/docker/backupdocu/letsencrypt:/etc/letsencrypt:ro
      - /opt/docker/backupdocu/certbot:/var/www/certbot:ro
    depends_on:
      - backend

