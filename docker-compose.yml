version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backupdocu-api
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
    volumes:
      - ./backend:/app
      - /opt/docker/backupdocu/data:/app/data

  nginx:
    image: nginx:alpine
    container_name: backupdocu-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend

