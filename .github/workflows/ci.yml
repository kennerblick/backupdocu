name: CI - BackupDocu Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-json-mode:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install pytest requests

    - name: Run API tests with JSON storage
      env:
        STORAGE_MODE: json
      run: |
        cd backend
        python -c "
        import subprocess
        import time
        import requests
        import os

        # Start FastAPI server in background
        proc = subprocess.Popen(['uvicorn', 'main:app', '--host', '0.0.0.0', '--port', '8000'], 
                               stdout=subprocess.PIPE, stderr=subprocess.PIPE)
        time.sleep(3)  # Wait for server to start

        try:
            # Test health endpoint
            resp = requests.get('http://localhost:8000/api/health')
            assert resp.status_code == 200
            print('✓ Health check passed')

            # Test health + stats are accessible (config endpoint removed)
            resp = requests.get('http://localhost:8000/api/stats')
            assert resp.status_code == 200
            stats = resp.json()
            assert 'servers' in stats
            print('✓ Stats endpoint passed')

            # Test empty lists
            for endpoint in ['servers', 'sources', 'methods', 'targets', 'jobs']:
                resp = requests.get(f'http://localhost:8000/api/{endpoint}')
                assert resp.status_code == 200
                assert isinstance(resp.json(), list)
                print(f'✓ {endpoint} list passed')

            # Test stats
            resp = requests.get('http://localhost:8000/api/stats')
            assert resp.status_code == 200
            stats = resp.json()
            assert 'servers' in stats
            assert stats['servers'] == 0  # Should be empty initially
            print('✓ Stats passed')

            # Test create server
            resp = requests.post('http://localhost:8000/api/servers', 
                               json={'name': 'Test Server', 'hostname': 'test.local'})
            assert resp.status_code == 201
            server = resp.json()
            assert server['name'] == 'Test Server'
            print('✓ Create server passed')

            # Test get server
            resp = requests.get(f'http://localhost:8000/api/servers/{server[\"id\"]}')
            assert resp.status_code == 200
            print('✓ Get server passed')

            # Test update server
            resp = requests.put(f'http://localhost:8000/api/servers/{server[\"id\"]}', 
                              json={'name': 'Updated Server', 'hostname': 'updated.local'})
            assert resp.status_code == 200
            updated = resp.json()
            assert updated['name'] == 'Updated Server'
            print('✓ Update server passed')

            # Test delete server
            resp = requests.delete(f'http://localhost:8000/api/servers/{server[\"id\"]}')
            assert resp.status_code == 204
            print('✓ Delete server passed')

            # Test stats after operations
            resp = requests.get('http://localhost:8000/api/stats')
            stats = resp.json()
            assert stats['servers'] == 0  # Should be back to 0
            print('✓ Final stats check passed')

            print('🎉 All JSON storage tests passed!')

        finally:
            proc.terminate()
            proc.wait()
        "
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: backupdocu_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install pytest requests

            print('✓ Stats passed')

            # Test create server
            resp = requests.post('http://localhost:8001/api/servers', 
                               json={'name': 'Test Server DB', 'hostname': 'test-db.local'})
            assert resp.status_code == 201
            server = resp.json()
            assert server['name'] == 'Test Server DB'
            print('✓ Create server passed')

            # Test get server
            resp = requests.get(f'http://localhost:8001/api/servers/{server[\"id\"]}')
            assert resp.status_code == 200
            print('✓ Get server passed')

            # Test update server
            resp = requests.put(f'http://localhost:8001/api/servers/{server[\"id\"]}', 
                              json={'name': 'Updated Server DB', 'hostname': 'updated-db.local'})
            assert resp.status_code == 200
            updated = resp.json()
            assert updated['name'] == 'Updated Server DB'
            print('✓ Update server passed')

            # Test delete server
            resp = requests.delete(f'http://localhost:8001/api/servers/{server[\"id\"]}')
            assert resp.status_code == 204
            print('✓ Delete server passed')

            print('🎉 All DB storage tests passed!')

        finally:
            proc.terminate()
            proc.wait()
        "

    - name: Check frontend syntax
      run: |
        # Basic HTML validation (just check if file exists and has basic structure)
        if grep -q '<!DOCTYPE html>' frontend/index.html; then
          echo "✓ Frontend HTML structure OK"
        else
          echo "✗ Frontend HTML missing DOCTYPE"
          exit 1
        fi