# HTTP-to-HTTPS Redirect (wird durch setup-https.sh aktiviert)
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Certbot challenge (für Zertifikat-Erneuerung)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
