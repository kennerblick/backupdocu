worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript;

    # HTTP Server (Standard)
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Frontend – statische Dateien
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Backend API Proxy
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # FastAPI Docs
        location /docs {
            proxy_pass http://backend:8000/docs;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://backend:8000/openapi.json;
        }

        # Certbot challenge (für Let's Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    # HTTP Redirect Server (optional – wird durch setup-https.sh aktiviert)
    include /etc/nginx/conf.d/http-redirect.conf*;

    # HTTPS Server (optional – wird durch setup-https.sh aktiviert)
    include /etc/nginx/conf.d/https.conf*;
}
