# HTTPS Server (wird nur geladen, wenn Zertifikate vorhanden sind)
# Diese Datei wird von nginx.conf via `include` geladen

server {
    listen 443 http2 ssl;
    listen [::]:443 http2 ssl;
    server_name _;

    # SSL-Zertifikate (Let's Encrypt oder selbstsigniert)
    ssl_certificate /etc/letsencrypt/live/backupdocu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backupdocu/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Frontend – statische Dateien
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxy
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # FastAPI Docs
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }

    # SSL Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
}
